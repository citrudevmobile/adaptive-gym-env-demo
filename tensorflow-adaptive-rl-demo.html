<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TensorFlow.js DQN - King of the Hill (3D Visualization)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Monaco', 'Courier New', monospace;
        }
        
        /* UI Overlay */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 8px;
            color: #0f0;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            min-width: 250px;
            border: 1px solid #ffaa44;
        }
        
        #metrics {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 8px;
            color: #ffaa44;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            text-align: right;
            font-family: monospace;
            min-width: 220px;
            border: 1px solid #ffaa44;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        
        button {
            background: linear-gradient(135deg, #ffaa44, #ff6600);
            color: #0a0a1a;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            transition: transform 0.2s;
            pointer-events: auto;
        }
        
        button:hover {
            transform: scale(1.02);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .btn-stop {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }
        
        .status-training {
            color: #ffaa44;
            animation: pulse 1s infinite;
        }
        
        .status-idle {
            color: #44ff44;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .metric-value {
            color: #ffaa44;
            font-weight: bold;
            font-size: 16px;
        }
        
        .metric-label {
            color: #aaa;
            font-size: 10px;
            text-transform: uppercase;
        }
        
        hr {
            border-color: #333;
            margin: 8px 0;
        }
        
        .in-zone {
            color: #44ff44;
            animation: pulse 0.5s infinite;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 14px; font-weight: bold; margin-bottom: 8px;">🧠 TensorFlow.js DQN</div>
        <div>Status: <span id="status" class="status-idle">IDLE</span></div>
        <div>Episode: <span id="episode">0</span></div>
        <div>Step: <span id="step">0</span></div>
        <div>Distance to Hill: <span id="distance">0.00</span></div>
        <div>In Hill Zone: <span id="inzone">❌ NO</span></div>
        <hr>
        <div>🏆 Episode Reward: <span id="episode-reward">0</span></div>
    </div>
    
    <div id="metrics">
        <div style="font-size: 14px; font-weight: bold; margin-bottom: 8px;">📊 Agent Metrics</div>
        <div>Exploration (ε): <span id="epsilon" class="metric-value">0.300</span></div>
        <div>Network Loss: <span id="loss" class="metric-value">0.0000</span></div>
        <div>Memory Size: <span id="memory" class="metric-value">0</span></div>
        <div>Total Steps: <span id="steps" class="metric-value">0</span></div>
        <hr>
        <div>🌍 Environment</div>
        <div>Move Interval: <span id="interval" class="metric-value">80</span> steps</div>
        <div>Goal Changes: <span id="goal-changes" class="metric-value">0</span></div>
        <div>Adaptation Time: <span id="adapt-time" class="metric-value">--</span> steps</div>
    </div>
    
    <div id="controls">
        <button id="btn-train">▶ START TRAINING</button>
        <button id="btn-stop" class="btn-stop">⏹ STOP</button>
    </div>

    <!-- Three.js for 3D visualization -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <!-- TensorFlow.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    
    <!-- Our Adaptive RL Module -->
    <script src="tensorflow-adaptive-rl.js"></script>
    
    <script type="module">
        import * as THREE from 'three';
        
        // ================================================================
        // THREE.JS VISUALIZATION SETUP
        // ================================================================
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.005);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 22, 22);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        scene.add(sunLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        // Ground
        const gridHelper = new THREE.GridHelper(45, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        // Arena bounds
        const boundsMat = new THREE.LineBasicMaterial({ color: 0x88aaff });
        const size = 18;
        const points = [
            new THREE.Vector3(-size, -0.5, -size), new THREE.Vector3(size, -0.5, -size),
            new THREE.Vector3(size, -0.5, size), new THREE.Vector3(-size, -0.5, size),
            new THREE.Vector3(-size, -0.5, -size)
        ];
        const boundsGeo = new THREE.BufferGeometry().setFromPoints(points);
        const boundsLine = new THREE.Line(boundsGeo, boundsMat);
        scene.add(boundsLine);
        
        // The Hill (Goal) - Golden Zone
        const hillGroup = new THREE.Group();
        
        const hillBase = new THREE.Mesh(
            new THREE.CylinderGeometry(2.5, 2.8, 0.3, 32),
            new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200, metalness: 0.7 })
        );
        hillBase.castShadow = true;
        hillGroup.add(hillBase);
        
        const hillRing = new THREE.Mesh(
            new THREE.TorusGeometry(2.3, 0.1, 32, 64),
            new THREE.MeshStandardMaterial({ color: 0xffcc66, emissive: 0xff6600 })
        );
        hillRing.rotation.x = Math.PI / 2;
        hillRing.position.y = 0.2;
        hillGroup.add(hillRing);
        
        const hillBeacon = new THREE.Mesh(
            new THREE.CylinderGeometry(0.3, 0.4, 0.8, 8),
            new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4400 })
        );
        hillBeacon.position.y = 0.6;
        hillGroup.add(hillBeacon);
        
        scene.add(hillGroup);
        
        const hillLight = new THREE.PointLight(0xff6600, 0.6, 15);
        scene.add(hillLight);
        
        // Agent (Blue Robot)
        const agentGroup = new THREE.Group();
        
        const agentBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 0.8, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.7 })
        );
        agentBody.castShadow = true;
        agentGroup.add(agentBody);
        
        const agentHead = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0x88ccff })
        );
        agentHead.position.y = 0.7;
        agentGroup.add(agentHead);
        
        const agentEye = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x44aaff })
        );
        agentEye.position.set(0.25, 0.85, 0.45);
        agentGroup.add(agentEye);
        
        const agentEye2 = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x44aaff })
        );
        agentEye2.position.set(-0.25, 0.85, 0.45);
        agentGroup.add(agentEye2);
        
        scene.add(agentGroup);
        
        // Trail effect
        let trailPositions = [];
        const trailMat = new THREE.PointsMaterial({ color: 0x44aaff, size: 0.12 });
        let trailPoints = new THREE.Points(new THREE.BufferGeometry(), trailMat);
        scene.add(trailPoints);
        
        // ================================================================
        // ADAPTIVE RL SETUP
        // ================================================================
        
        // Create environment with adaptive features
        const env = new TensorFlowRL.Environment({
            arenaSize: 18,
            hillRadius: 2.5,
            hillMoveInterval: 80,
            adaptiveInterval: true,
            adaptiveIntervalRange: { min: 40, max: 160 },
            agentSpeed: 0.45
        });
        
        // Create TensorFlow.js DQN agent
        const agent = new TensorFlowRL.DQNAgent({
            learningRate: 0.001,
            discountFactor: 0.95,
            epsilon: 0.3,
            epsilonMin: 0.05,
            epsilonDecay: 0.995,
            memorySize: 10000,
            batchSize: 32,
            targetUpdateFreq: 100
        });
        
        // Create trainer
        const trainer = new TensorFlowRL.Trainer(env, agent);
        
        // ================================================================
        // UI ELEMENTS
        // ================================================================
        
        const statusEl = document.getElementById('status');
        const episodeEl = document.getElementById('episode');
        const stepEl = document.getElementById('step');
        const distanceEl = document.getElementById('distance');
        const inzoneEl = document.getElementById('inzone');
        const episodeRewardEl = document.getElementById('episode-reward');
        const epsilonEl = document.getElementById('epsilon');
        const lossEl = document.getElementById('loss');
        const memoryEl = document.getElementById('memory');
        const stepsEl = document.getElementById('steps');
        const intervalEl = document.getElementById('interval');
        const goalChangesEl = document.getElementById('goal-changes');
        const adaptTimeEl = document.getElementById('adapt-time');
        
        let currentStep = 0;
        let currentTotalReward = 0;
        
        // ================================================================
        // TRAINING CALLBACKS - Update 3D Visualization
        // ================================================================
        
        trainer.onUpdate((data) => {
            if (data.type === 'step') {
                // Update 3D visualization with current positions
                const obs = data.observation;
                
                // Convert normalized coordinates to world positions
                // arenaSize is 18, so map from [-1,1] to [-18,18]
                const agentWorldX = obs[0] * 18;
                const agentWorldZ = obs[1] * 18;
                const hillWorldX = obs[2] * 18;
                const hillWorldZ = obs[3] * 18;
                
                // Update positions
                agentGroup.position.set(agentWorldX, 0, agentWorldZ);
                hillGroup.position.set(hillWorldX, 0, hillWorldZ);
                hillLight.position.set(hillWorldX, 1.5, hillWorldZ);
                
                // Update trail
                trailPositions.unshift({ x: agentWorldX, z: agentWorldZ });
                if (trailPositions.length > 40) trailPositions.pop();
                
                const vertices = [];
                for (const pos of trailPositions) {
                    vertices.push(pos.x, 0.1, pos.z);
                }
                const trailGeo = new THREE.BufferGeometry();
                trailGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                scene.remove(trailPoints);
                trailPoints = new THREE.Points(trailGeo, trailMat);
                scene.add(trailPoints);
                
                // Update UI
                currentStep = data.step;
                currentTotalReward = data.totalReward;
                
                episodeEl.textContent = data.episode;
                stepEl.textContent = data.step;
                distanceEl.textContent = data.distance.toFixed(2);
                episodeRewardEl.textContent = Math.floor(data.totalReward);
                
                if (data.inZone) {
                    inzoneEl.innerHTML = '✅ YES';
                    inzoneEl.className = 'in-zone';
                    hillLight.intensity = 1.0;
                    hillBeacon.material.emissiveIntensity = 0.8;
                } else {
                    inzoneEl.innerHTML = '❌ NO';
                    inzoneEl.className = '';
                    hillLight.intensity = 0.5;
                    hillBeacon.material.emissiveIntensity = 0.2;
                }
                
                // Update agent metrics
                if (data.agentMetrics) {
                    epsilonEl.textContent = data.agentMetrics.epsilon;
                    lossEl.textContent = data.agentMetrics.lastLoss;
                    memoryEl.textContent = data.agentMetrics.memorySize;
                    stepsEl.textContent = data.agentMetrics.totalSteps;
                }
                
                // Update environment metrics
                if (data.envMetrics) {
                    intervalEl.textContent = data.envMetrics.currentInterval;
                    goalChangesEl.textContent = data.envMetrics.totalGoalChanges;
                    const adaptTime = data.envMetrics.averageAdaptationTime;
                    adaptTimeEl.textContent = adaptTime ? adaptTime.toFixed(1) : '--';
                }
                
                // Animate the hill ring
                hillRing.rotation.z += 0.05;
                
                // Animate agent (bobbing)
                agentGroup.position.y = Math.sin(Date.now() * 0.01) * 0.05;
                
                // Log goal moves to console
                if (data.goalMoved) {
                    console.log(`🏔️ Hill moved! New interval: ${data.envMetrics?.currentInterval} steps`);
                }
            }
            
            if (data.type === 'episode_complete') {
                console.log(`📊 Episode ${data.episode} complete. Reward: ${data.reward.toFixed(1)}. Epsilon: ${data.agentMetrics.epsilon}. Loss: ${data.agentMetrics.lastLoss}`);
                
                // Flash effect when episode completes
                const flashMat = new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true });
                const flashSphere = new THREE.Mesh(new THREE.SphereGeometry(5, 16, 16), flashMat);
                flashSphere.position.set(0, 2, 0);
                scene.add(flashSphere);
                
                let opacity = 0.8;
                const flashInterval = setInterval(() => {
                    opacity -= 0.1;
                    flashSphere.material.opacity = opacity;
                    if (opacity <= 0) {
                        scene.remove(flashSphere);
                        clearInterval(flashInterval);
                    }
                }, 50);
            }
        });
        
        // ================================================================
        // CAMERA FOLLOW
        // ================================================================
        
        function updateCamera() {
            if (agentGroup.position) {
                const targetX = agentGroup.position.x;
                const targetZ = agentGroup.position.z;
                camera.position.x += (targetX - camera.position.x) * 0.05;
                camera.position.z += (targetZ + 14 - camera.position.z) * 0.05;
                camera.lookAt(targetX, 0, targetZ);
            }
        }
        
        // ================================================================
        // BUTTON HANDLERS
        // ================================================================
        
        const btnTrain = document.getElementById('btn-train');
        const btnStop = document.getElementById('btn-stop');
        
        btnTrain.onclick = async () => {
            if (trainer.trainingActive) {
                console.log('Training already in progress...');
                return;
            }
            
            statusEl.innerHTML = 'TRAINING';
            statusEl.className = 'status-training';
            console.log('========================================');
            console.log('🎮 STARTING TRAINING - 100 Episodes');
            console.log('🧠 Neural Network: 6 inputs -> 64 -> 64 -> 5 outputs');
            console.log('🎯 Watch the blue robot learn to chase the golden hill!');
            console.log('========================================');
            
            // Clear trail
            trailPositions = [];
            
            await trainer.train(100, 500);
            
            statusEl.innerHTML = 'COMPLETE';
            console.log('========================================');
            console.log('✅ TRAINING COMPLETE!');
            console.log(`📊 Final epsilon: ${agent.epsilon.toFixed(3)}`);
            console.log('========================================');
            
            setTimeout(() => {
                statusEl.innerHTML = 'IDLE';
                statusEl.className = 'status-idle';
            }, 2000);
        };
        
        btnStop.onclick = () => {
            trainer.stop();
            statusEl.innerHTML = 'STOPPED';
            console.log('⏹️ Training stopped by user');
            setTimeout(() => {
                statusEl.innerHTML = 'IDLE';
                statusEl.className = 'status-idle';
            }, 1000);
        };
        
        // ================================================================
        // ANIMATION LOOP
        // ================================================================
        
        function animate() {
            requestAnimationFrame(animate);
            updateCamera();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('🎮 TensorFlow.js Adaptive RL - 3D Visualization Ready!');
        console.log('🤖 Agent uses Deep Q-Network (6->64->64->5)');
        console.log('🏔️ Hill moves every N steps, N changes adaptively!');
        console.log('📊 Click START TRAINING to watch the agent learn');
    </script>
</body>
</html>
